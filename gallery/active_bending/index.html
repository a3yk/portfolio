<!DOCTYPE html>
<html lang="en">

<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.8.1/baguetteBox.min.css">

<style>

body{
margin:0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.gallery a{
display:block;
overflow:hidden;
border-radius:8px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
transition:transform 0.2s ease;
}

.gallery a:hover{
transform:translateY(-5px);
}

.gallery img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}


.gallery a{
border-radius:4px;
}

.baguetteBox-button{
background-color:rgba(120,120,120,0.25) !important;
}

.baguetteBox-button svg{
fill:white;
}

#baguetteBox-overlay img{
max-width:20%;
max-height:20%;
margin:auto;
}

/* create margin around popup image */
#baguetteBox-overlay .full-image{
padding:8vh 8vw;
box-sizing:border-box;
}

/* prevent image from touching edges */
#baguetteBox-overlay img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

#baguetteBox-overlay{
background:rgba(0,0,0,0.85);
}

/* ---------- thumbnail hover refinement ---------- */

.gallery a{
border-radius:2;
overflow:hidden;
}

.gallery img{
transition:transform 0.35s ease;
}

.gallery a:hover img{
transform:scale(1.04);
}


/* ---------- popup overlay style ---------- */

#baguetteBox-overlay{
background:rgba(0,0,0,0.88);
transition:opacity .35s ease;
}


/* ---------- space around popup image ---------- */

#baguetteBox-overlay .full-image{
padding:10vh 10vw;
box-sizing:border-box;
}


/* ---------- smooth image appearance ---------- */

#baguetteBox-overlay img{
max-width:100%;
max-height:100%;
object-fit:contain;
transform:scale(.96);
opacity:0;
transition:all .35s ease;
}

#baguetteBox-overlay.visible img{
transform:scale(1);
opacity:1;
}


/* ---------- navigation arrows minimal ---------- */

.baguetteBox-button{
background:transparent !important;
opacity:0;
transition:opacity .25s ease;
}


/* show arrows only when hovering */

#baguetteBox-overlay:hover .baguetteBox-button{
opacity:.35;
}

#baguetteBox-overlay:hover .baguetteBox-button:hover{
opacity:.75;
}


/* ---------- arrow icon style ---------- */

.baguetteBox-button svg{
fill:white;
filter:drop-shadow(0 0 4px rgba(0,0,0,0.4));
}
  
</style>

</head>

<body>

<div class="gallery" id="gallery"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.8.1/baguetteBox.min.js"></script>

<script>

const username = "a3yk"
const repo = "portfolio"
const folder = "gallery/active_bending"   // example: projects/images

const apiURL = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`

fetch(apiURL)
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery")

data
.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i))

// auto sort by filename
.sort((a,b)=>a.name.localeCompare(b.name))

.forEach(file => {

gallery.innerHTML += `
<a class="lightbox" href="${file.download_url}">
<img loading="lazy" src="${file.download_url}">
</a>
`

})

baguetteBox.run('.gallery')

})

</script>

</body>
</html>
