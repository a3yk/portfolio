<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full-Screen Responsive Image Slider</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css'>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap");

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Lexend", sans-serif;
      background-color: #362a2b;
      color: #e5ebf3;
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y; /* allow vertical scroll but we'll handle horizontal swipe */
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    /* On portrait / mobile screens: show the full image without cropping */
    @media (orientation: portrait), (max-width: 768px) {
      .slide {
        background-size: contain;
        background-position: center center;
      }
    }

    .slide.current {
      opacity: 1;
    }

    /* ── Navigation Buttons ── */
    .buttons button {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: 2px solid #e5ebf3;
      background-color: rgba(54, 42, 43, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #e5ebf3;
      cursor: pointer;
      padding: 13px 15px;
      border-radius: 50%;
      outline: none;
      z-index: 100;
      transition: background-color 0.2s, color 0.2s;
    }

    .buttons button#prev {
      left: calc(1rem + env(safe-area-inset-left, 0px));
    }

    .buttons button#next {
      right: calc(1rem + env(safe-area-inset-right, 0px));
    }

    .buttons button:hover,
    .buttons button:focus-visible {
      background-color: #e5ebf3;
      color: #362a2b;
    }

    /* Smaller buttons on mobile */
    @media (max-width: 480px) {
      .buttons button {
        padding: 10px 12px;
        font-size: 0.85rem;
      }

      .buttons button#prev {
        left: calc(0.5rem + env(safe-area-inset-left, 0px));
      }

      .buttons button#next {
        right: calc(0.5rem + env(safe-area-inset-right, 0px));
      }
    }

    /* ── Slide Counter ── */
    #counter {
      position: fixed;
      bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: rgba(229, 235, 243, 0.7);
      z-index: 100;
      pointer-events: none;
    }

    #counter.hidden {
      display: none;
    }

    /* ── Loading State ── */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #e5ebf3;
      z-index: 999;
    }

    .loading-spinner {
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid rgba(229, 235, 243, 0.3);
      border-top-color: #e5ebf3;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading.hidden {
      display: none;
    }

    .buttons.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="loading">
    <span class="loading-spinner"></span>
    Loading slides…
  </div>

  <div class="slider" id="slider"></div>

  <div class="buttons hidden" id="buttons">
    <button id="prev" aria-label="Previous slide"><i class="fas fa-arrow-left"></i></button>
    <button id="next" aria-label="Next slide"><i class="fas fa-arrow-right"></i></button>
  </div>

  <div id="counter" class="hidden"></div>

  <script>
    /* =====================================================================
       GITHUB CONFIG — adjust these if the repo/branch/folder changes
    ===================================================================== */
    const GITHUB_USER   = 'a3yk';
    const GITHUB_REPO   = 'portfolio';
    const GITHUB_BRANCH = 'main';
    const GITHUB_FOLDER = 'slides/paper_stool';

    const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FOLDER}`;
    const API_URL  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}?ref=${GITHUB_BRANCH}`;

    /* =====================================================================
       AUTO SLIDE CONFIG
    ===================================================================== */
    const auto         = true;
    const intervalTime = 5000;
    let   slideInterval;

    /* =====================================================================
       BUILD SLIDER FROM GITHUB IMAGES
    ===================================================================== */
    async function buildSlider() {
      const loadingEl = document.getElementById('loading');
      const slider    = document.getElementById('slider');
      const buttons   = document.getElementById('buttons');
      const counter   = document.getElementById('counter');

      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`GitHub API responded with ${res.status}`);
        const files = await res.json();

        const images = files
          .filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name))
          .sort((a, b) => {
            const num = s => { const m = s.name.match(/\d+/); return m ? parseInt(m[0], 10) : 0; };
            return num(a) - num(b);
          });

        if (images.length === 0) {
          loadingEl.querySelector('.loading-spinner').remove();
          loadingEl.textContent = '⚠️ No images found in the repository folder.';
          return;
        }

        images.forEach((img, index) => {
          const slide     = document.createElement('div');
          slide.className = 'slide' + (index === 0 ? ' current' : '');
          slide.style.backgroundImage = `url("${RAW_BASE}/${img.name}")`;
          slider.appendChild(slide);
        });

        loadingEl.classList.add('hidden');
        buttons.classList.remove('hidden');
        counter.classList.remove('hidden');

        initControls(images.length);

      } catch (err) {
        loadingEl.querySelector('.loading-spinner')?.remove();
        loadingEl.textContent = `⚠️ Could not load slides: ${err.message}`;
        console.error(err);
      }
    }

    /* =====================================================================
       SLIDER CONTROLS
    ===================================================================== */
    function initControls(total) {
      const nextButton = document.getElementById('next');
      const prevButton = document.getElementById('prev');
      const counter    = document.getElementById('counter');

      const getSlides    = () => document.querySelectorAll('.slide');
      const currentIndex = () => [...getSlides()].findIndex(s => s.classList.contains('current'));

      const updateCounter = () => {
        counter.textContent = `${currentIndex() + 1} / ${total}`;
      };

      updateCounter();

      const goTo = (index) => {
        const slides = getSlides();
        slides[currentIndex()].classList.remove('current');
        slides[(index + total) % total].classList.add('current');
        updateCounter();
      };

      const nextSlide = () => goTo(currentIndex() + 1);
      const prevSlide = () => goTo(currentIndex() - 1);

      const resetInterval = () => {
        if (auto) {
          clearInterval(slideInterval);
          slideInterval = setInterval(nextSlide, intervalTime);
        }
      };

      nextButton.addEventListener('click', () => { nextSlide(); resetInterval(); });
      prevButton.addEventListener('click', () => { prevSlide(); resetInterval(); });

      /* ── Keyboard Navigation ── */
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { nextSlide(); resetInterval(); }
        if (e.key === 'ArrowLeft')  { prevSlide(); resetInterval(); }
      });

      /* ── Touch / Swipe Support ── */
      let touchStartX = null;

      document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (touchStartX === null) return;
        const delta = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(delta) > 40) {          // 40px threshold
          delta > 0 ? nextSlide() : prevSlide();
          resetInterval();
        }
        touchStartX = null;
      }, { passive: true });

      if (auto) {
        slideInterval = setInterval(nextSlide, intervalTime);
      }
    }

    buildSlider();
  </script>

</body>
</html>
